<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>egui_expressive Export</title>
  <style>
    /* M3 dark theme */
    :root {
      --surface: #1c1b1f;
      --surface-container: #2b2930;
      --surface-container-high: #36343b;
      --on-surface: #e6e1e5;
      --on-surface-variant: #cac4d0;
      --primary: #d0bcff;
      --on-primary: #381e72;
      --outline: #938f99;
      --outline-variant: #49454f;
      --error: #f2b8b5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--surface);
      color: var(--on-surface);
      font-size: 12px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    /* Header */
    .header {
      padding: 12px 16px 8px;
      border-bottom: 1px solid var(--outline-variant);
      flex-shrink: 0;
    }
    .header h1 { font-size: 14px; font-weight: 500; color: var(--primary); }
    .header p { font-size: 11px; color: var(--on-surface-variant); margin-top: 2px; }
    
    /* Artboard list */
    .artboard-section {
      padding: 8px 12px;
      border-bottom: 1px solid var(--outline-variant);
      flex-shrink: 0;
    }
    .section-label { 
      font-size: 10px; 
      text-transform: uppercase; 
      letter-spacing: 0.08em;
      color: var(--on-surface-variant);
      margin-bottom: 6px;
    }
    .artboard-list { max-height: 100px; overflow-y: auto; }
    .artboard-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 6px;
      border-radius: 4px;
      cursor: pointer;
    }
    .artboard-item:hover { background: var(--surface-container); }
    .artboard-item input[type=checkbox] { accent-color: var(--primary); }
    .artboard-item label { flex: 1; cursor: pointer; }
    
    /* Options */
    .options-section {
      padding: 8px 12px;
      border-bottom: 1px solid var(--outline-variant);
      flex-shrink: 0;
    }
    .option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3px 0;
    }
    .option-row label { color: var(--on-surface-variant); font-size: 11px; }
    .toggle {
      width: 32px; height: 16px;
      background: var(--outline);
      border-radius: 8px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle.on { background: var(--primary); }
    .toggle::after {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      background: white;
      border-radius: 50%;
      top: 2px; left: 2px;
      transition: left 0.2s;
    }
    .toggle.on::after { left: 18px; }
    
    /* Export button */
    .export-btn {
      margin: 8px 12px;
      padding: 10px;
      background: var(--primary);
      color: var(--on-primary);
      border: none;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      width: calc(100% - 24px);
      flex-shrink: 0;
    }
    .export-btn:hover { opacity: 0.9; }
    .export-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    /* Main content area — split: file tree + code preview */
    .content-area {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    
    /* File tree */
    .file-tree {
      width: 140px;
      flex-shrink: 0;
      border-right: 1px solid var(--outline-variant);
      overflow-y: auto;
      padding: 8px 0;
    }
    .file-tree-header {
      padding: 4px 12px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--on-surface-variant);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .file-tree-header button {
      background: none;
      border: none;
      color: var(--primary);
      font-size: 10px;
      cursor: pointer;
      padding: 0;
    }
    .tree-folder {
      padding: 4px 12px;
      color: var(--on-surface-variant);
      font-size: 11px;
    }
    .tree-file {
      padding: 4px 12px 4px 20px;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 0;
    }
    .tree-file:hover { background: var(--surface-container); }
    .tree-file.active { background: var(--surface-container-high); color: var(--primary); }
    .tree-file .dl-btn {
      background: none;
      border: none;
      color: var(--on-surface-variant);
      cursor: pointer;
      padding: 0 2px;
      font-size: 10px;
      opacity: 0;
    }
    .tree-file:hover .dl-btn { opacity: 1; }
    
    /* Code preview */
    .code-preview {
      flex: 1;
      overflow: auto;
      padding: 8px;
    }
    .code-preview pre {
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 10px;
      line-height: 1.5;
      color: var(--on-surface);
      white-space: pre;
      tab-size: 4;
    }
    .code-preview .kw { color: #c792ea; }
    .code-preview .fn { color: #82aaff; }
    .code-preview .str { color: #c3e88d; }
    .code-preview .num { color: #f78c6c; }
    .code-preview .comment { color: #546e7a; font-style: italic; }
    .code-preview .type { color: #ffcb6b; }
    
    /* Copy button */
    .copy-btn {
      position: sticky;
      top: 4px;
      float: right;
      background: var(--surface-container-high);
      border: 1px solid var(--outline-variant);
      color: var(--on-surface-variant);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 10px;
      cursor: pointer;
      margin-bottom: 4px;
    }
    
    /* Warnings panel */
    .warnings-panel {
      background: rgba(242, 184, 181, 0.1);
      border-top: 1px solid rgba(242, 184, 181, 0.3);
      padding: 8px 12px;
      flex-shrink: 0;
      max-height: 80px;
      overflow-y: auto;
    }
    .warnings-panel .warn-title {
      color: var(--error);
      font-size: 10px;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .warnings-panel .warn-item {
      font-size: 10px;
      color: var(--on-surface-variant);
      padding: 1px 0;
    }
    
    /* Status bar */
    .status-bar {
      padding: 4px 12px;
      font-size: 10px;
      color: var(--on-surface-variant);
      border-top: 1px solid var(--outline-variant);
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .ai-parser-status {
      font-size: 10px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .ai-parser-status .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--outline);
    }
    .ai-parser-status.available .dot { background: #4caf50; }
    .ai-parser-status.available { color: #4caf50; }
    .ai-parser-status.unavailable .dot { background: var(--outline); }
    .ai-parser-status.unavailable { color: var(--on-surface-variant); }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--on-surface-variant);
      font-size: 11px;
      gap: 8px;
    }
    .empty-state .icon { font-size: 24px; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
  <div class="header">
    <h1>egui_expressive Export</h1>
    <p>Illustrator → Rust scaffold generator</p>
  </div>
  
  <div class="artboard-section">
    <div class="section-label">Artboards <span id="artboard-count"></span></div>
    <div style="display:flex;gap:8px;margin-bottom:6px;">
      <button onclick="selectAll(true)" style="background:none;border:none;color:var(--primary);font-size:11px;cursor:pointer;padding:0;">Select all</button>
      <button onclick="selectAll(false)" style="background:none;border:none;color:var(--on-surface-variant);font-size:11px;cursor:pointer;padding:0;">None</button>
    </div>
    <div class="artboard-list" id="artboard-list">
      <div style="color:var(--on-surface-variant);font-size:11px;padding:4px 0;">Loading artboards...</div>
    </div>
  </div>
  
  <div class="artboard-section" id="page-tiles-section" style="display:none;">
    <div class="section-label">Page Tiles <span id="tile-count"></span> <span style="font-size:10px;color:var(--on-surface-variant);">(from .ai file)</span></div>
    <div style="display:flex;gap:4px;margin:2px 0 4px;">
      <button onclick="toggleAllTiles(true)" style="font-size:10px;padding:2px 6px;background:var(--surface-container);border:1px solid var(--outline-variant);border-radius:4px;color:var(--on-surface);cursor:pointer;">Select All</button>
      <button onclick="toggleAllTiles(false)" style="font-size:10px;padding:2px 6px;background:var(--surface-container);border:1px solid var(--outline-variant);border-radius:4px;color:var(--on-surface);cursor:pointer;">Deselect All</button>
    </div>
    <div class="artboard-list" id="tile-list"></div>
  </div>
  
  <div class="options-section">
    <div class="option-row">
      <label>Use naming conventions</label>
      <div class="toggle on" id="toggle-naming" onclick="toggleOption('naming')"></div>
    </div>
    <div class="option-row">
      <label>Infer gaps</label>
      <div class="toggle on" id="toggle-gaps" onclick="toggleOption('gaps')"></div>
    </div>
    <div class="option-row">
      <label>JSON sidecar</label>
      <div class="toggle on" id="toggle-sidecar" onclick="toggleOption('sidecar')"></div>
    </div>
    <div class="option-row">
      <label>Library-native emit</label>
      <div class="toggle on" id="toggle-native" onclick="toggleOption('native')"></div>
    </div>
  </div>
  
  <button class="export-btn" id="export-btn" onclick="doExport()">Export Selected Artboards</button>
  
  <div class="content-area">
    <div class="file-tree" id="file-tree">
      <div class="empty-state">
        <div class="icon">📁</div>
        <div>Export to see files</div>
      </div>
    </div>
    <div class="code-preview" id="code-preview">
      <div class="empty-state">
        <div class="icon">⬅</div>
        <div>Select a file to preview</div>
      </div>
    </div>
  </div>
  
  <div class="warnings-panel" id="warnings-panel" style="display:none;">
    <div class="warn-title">⚠️ Elements requiring manual attention</div>
    <div id="warnings-list"></div>
  </div>
  
  <div class="status-bar" id="status-bar">Ready</div>
  <div class="ai-parser-status" id="ai-parser-status" title="Project file analysis via ai-parser"></div>

  <!-- Plugin codegen library loaded for both UXP and CEP panel contexts -->
  <script src="plugin.js"></script>
  <script>
    const options = { naming: true, gaps: true, sidecar: true, native: true };
    let generatedFiles = {};
    let activeFile = null;
    
    function toggleOption(key) {
      options[key] = !options[key];
      const el = document.getElementById('toggle-' + key);
      el.classList.toggle('on', options[key]);
    }
    
    function selectAll(val) {
      document.querySelectorAll('#artboard-list input[type=checkbox]').forEach(cb => cb.checked = val);
    }
    
    function toggleAllTiles(val) {
      document.querySelectorAll('#tile-list input[type=checkbox]').forEach(cb => cb.checked = val);
    }

    function loadPageTiles(tiles) {
      const section = document.getElementById('page-tiles-section');
      const list = document.getElementById('tile-list');
      if (!tiles || !tiles.length) { section.style.display = 'none'; return; }
      section.style.display = 'block';
      document.getElementById('tile-count').textContent = `(${tiles.length})`;
      list.innerHTML = tiles.map((t, i) => `
        <div class="artboard-item">
          <input type="checkbox" id="tile-${i}" checked>
          <label for="tile-${i}">${escapeHtml(t.name)} <span style="color:var(--on-surface-variant)">${Math.round(t.width)}×${Math.round(t.height)}</span></label>
        </div>
      `).join('');
    }
    
    function setStatus(msg) {
      document.getElementById('status-bar').textContent = msg;
    }
    
    function showArtboardError(msg) {
      const list = document.getElementById('artboard-list');
      list.innerHTML = `<div style="color:var(--error);font-size:11px;padding:4px 0;">${escapeHtml(msg)}</div>`;
    }
    
    function checkPageTiles() {
      if (window.__adobe_cep__) {
        window.__adobe_cep__.evalScript('getDocumentInfoJSON()', function(result) {
          try {
            var info = JSON.parse(result);
            if (info && info.pageTiles && info.pageTiles.length > 0) {
              loadPageTiles(info.pageTiles);
              showArtboardError('Document uses page tiles instead of artboards.');
            } else {
              showArtboardError('No artboards or page tiles found.');
            }
          } catch(e) {
            showArtboardError('Error parsing document info: ' + e.message);
          }
        });
      } else {
        showArtboardError('No artboards. The document may have page tiles — use File → Export via ai-parser for multi-page layouts.');
      }
    }
    
    // Request artboard list on load
    window.addEventListener('load', () => {
      try {
        if (window.__adobe_cep__) {
          // CEP: use evalScript to call ExtendScript functions in host.jsx
          try {
            window.__adobe_cep__.evalScript('getDiagnosticsJSON()', function(diagResult) {
                try {
                    var diag = JSON.parse(diagResult);
                    if (diag && diag.error) {
                        showArtboardError('Illustrator error: ' + diag.error);
                        setStatus('Illustrator error: ' + diag.error);
                        return;
                    }
                    if (!diag.hasDoc) {
                        showArtboardError('No document open in Illustrator. Open an .ai file first.');
                        setStatus('Open an Illustrator document first');
                        return;
                    }
                    if (diag.artboardCount === 0) {
                        // No artboards — try page tiles from ai_parser
                        setStatus('No artboards, checking for page tiles...');
                        checkPageTiles();
                        return;
                    }
                    // Proceed to load artboards
                    window.__adobe_cep__.evalScript('getArtboardsJSON()', function(result) {
                        if (result === 'EvalScript error.') {
                            showArtboardError('evalScript error — host.jsx may not be loaded. Check CEP debug mode.');
                            setStatus('evalScript error — host.jsx may not be loaded. Check CEP debug mode.');
                        } else if (!result || result === 'undefined') {
                            showArtboardError('No document open in Illustrator');
                            setStatus('No document open in Illustrator');
                        } else {
                            try {
                                var parsed = JSON.parse(result);
                                if (parsed && parsed.error) {
                                    showArtboardError('Illustrator error: ' + parsed.error);
                                    setStatus('Illustrator error: ' + parsed.error);
                                    return;
                                }
                                loadArtboards(parsed);
                                // Check if document might have page tiles (single large artboard)
                                if (parsed.length === 1) {
                                  var ab = parsed[0];
                                  if (ab.width > 1200 || ab.height > 1200) {
                                    // Large artboard — may contain page tiles
                                    // Will be populated if ai_parser finds tiles
                                  }
                                }
                            } catch(e) {
                                showArtboardError('Error parsing artboard data: ' + e.message);
                                setStatus('Error parsing artboard data: ' + e.message);
                            }
                        }
                    });
                } catch(e) {
                    // diagResult was 'EvalScript error.' or unparseable — evalScript not working
                    showArtboardError('evalScript failed — CEP debug mode may not be enabled. Run install_zxp.bat again to enable it.');
                    setStatus('CEP evalScript not working');
                }
            });
          } catch(ce) {
            showArtboardError('CEP error: ' + ce.message);
            setStatus('CEP error: ' + ce.message);
          }
        } else {
          // UXP path: postMessage
          window.postMessage({ type: 'GET_ARTBOARDS' }, '*');
        }
      } catch(e) {
        setStatus('Connect to Illustrator to load artboards');
      }
      checkAiParser();
    });
    
    function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
    
    function loadArtboards(data) {
      const list = document.getElementById('artboard-list');
      const artboards = typeof data === 'string' ? JSON.parse(data) : data;
      if (!artboards || !artboards.length) {
        list.innerHTML = '<div style="color:var(--on-surface-variant);font-size:11px;padding:4px 0;">No artboards found</div>';
        return;
      }
      document.getElementById('artboard-count').textContent = `(${artboards.length})`;
      list.innerHTML = artboards.map((ab, i) => `
        <div class="artboard-item">
          <input type="checkbox" id="ab-${i}" checked>
          <label for="ab-${i}">${escapeHtml(ab.name)} <span style="color:var(--on-surface-variant)">${Math.round(ab.width)}×${Math.round(ab.height)}</span></label>
        </div>
      `).join('');
    }
    
    function doExport() {
      const selected = Array.from(document.querySelectorAll('#artboard-list input:checked'))
        .map(cb => parseInt(cb.id.replace('ab-', '')));
      const selectedTiles = Array.from(document.querySelectorAll('#tile-list input:checked'))
        .map(cb => {
          const idx = parseInt(cb.id.replace('tile-', ''));
          return currentTiles[idx];
        });
      if (!selected.length && !selectedTiles.length) { setStatus('Select at least one artboard or page tile'); return; }
      
      document.getElementById('export-btn').disabled = true;
      setStatus('Exporting...');
      
      var exportPayload = {
        selected: selected,
        selectedTiles: selectedTiles
      };
      
      try {
        if (window.__adobe_cep__) {
          // CEP panel mode: artboard discovery works via evalScript (host.jsx),
          // but full export requires the Illustrator DOM API which is only available
          // in ExtendScript or UXP contexts. Attempt client-side codegen with
          // data fetched from host.jsx via evalScript.
          window.__adobe_cep__.evalScript('getArtboardsJSON()', function(abResult) {
            if (abResult === 'EvalScript error.') {
              document.getElementById('export-btn').disabled = false;
              setStatus('evalScript error — host.jsx may not be loaded. Check CEP debug mode.');
              return;
            } else if (!abResult || abResult === 'undefined') {
              document.getElementById('export-btn').disabled = false;
              setStatus('No document open in Illustrator');
              return;
            }
            // In CEP, we can show artboards but export needs ExtendScript-side processing
            // Since full export pipeline is in ExtendScript host.jsx, call it per artboard
            window.__adobe_cep__.evalScript('extractArtboardDataJSON(' + JSON.stringify(JSON.stringify(exportPayload)) + ')', function(result) {
              if (result === 'EvalScript error.') {
                document.getElementById('export-btn').disabled = false;
                setStatus('evalScript error — host.jsx may not be loaded. Check CEP debug mode.');
                return;
              } else if (!result || result === 'undefined') {
                document.getElementById('export-btn').disabled = false;
                setStatus('Could not extract artboard data');
                return;
              }
              try {
                const rawData = JSON.parse(result);
                if (rawData && rawData.error) {
                  document.getElementById('export-btn').disabled = false;
                  setStatus('Illustrator error: ' + rawData.error);
                  return;
                }
                const exportResult = exportFromRawData(rawData, options);
                handleExportResult({ payload: { files: exportResult.files, filesArray: Object.entries(exportResult.files).map(([filename, content]) => ({filename, content})), colorMap: exportResult.colorMap, warnings: exportResult.warnings || [] } });
                document.getElementById('export-btn').disabled = false;
                setStatus('Exported ' + Object.keys(exportResult.files).length + ' files');
              } catch(e) {
                document.getElementById('export-btn').disabled = false;
                setStatus('Error processing export: ' + e.message);
              }
            });
          });
        } else {
          // UXP path: postMessage
          window.postMessage({ 
            type: 'EXPORT', 
            selectedIndices: selected,
            selectedTiles: selectedTiles,
            options 
          }, '*');
        }
      } catch(e) {
        setStatus('Error: ' + e.message);
        document.getElementById('export-btn').disabled = false;
      }
    }
    
    // Handle messages from plugin.js
    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg) return;

      if (msg.type === 'ARTBOARDS_RESULT') {
        if (!msg.artboards || msg.artboards.length === 0) {
          showArtboardError('No artboards found. Make sure an Illustrator document is open with at least one artboard.');
          setStatus('No artboards found');
        } else {
          loadArtboards(msg.artboards);
        }
      } else if (msg.type === 'EXPORT_RESULT') {
        handleExportResult(msg);
      } else if (msg.type === 'AI_PARSER_STATUS') {
        updateAiParserStatus(msg.available);
      } else if (msg.type === 'ERROR') {
        document.getElementById('export-btn').disabled = false;
        setStatus('Error: ' + (msg.message || 'Unknown error'));
        showArtboardError(msg.message || 'Unknown error');
      }
    });

    // Check ai-parser availability on load
    function checkAiParser() {
      try {
        if (typeof window.__adobe_cep__ === 'undefined') {
          window.postMessage({ type: 'CHECK_AI_PARSER' }, '*');
        }
      } catch(e) {
        // Not in UXP context or host not available
      }
    }

    function updateAiParserStatus(available) {
      const el = document.getElementById('ai-parser-status');
      if (!el) return;
      el.className = 'ai-parser-status ' + (available ? 'available' : 'unavailable');
      el.innerHTML = `<span class="dot"></span>Project file analysis: ${available ? 'Available' : 'Not available'}`;
    }
    
    function handleExportResult(msg) {
      document.getElementById('export-btn').disabled = false;
      
      const result = msg.payload || msg;
      if (result.error) {
        setStatus('Error: ' + result.error);
        return;
      }
      
      // Build file map
      generatedFiles = {};
      if (result.files) {
        if (Array.isArray(result.files)) {
          result.files.forEach(f => { generatedFiles[f.filename] = f.content; });
        } else {
          // files is an object map { filename: content, ... }
          generatedFiles = result.files;
        }
      } else if (result.filesArray) {
        result.filesArray.forEach(f => { generatedFiles[f.filename] = f.content; });
      }
      
      // Show warnings
      const warnings = result.warnings || [];
      if (warnings.length > 0) {
        document.getElementById('warnings-panel').style.display = 'block';
        const wl = document.getElementById('warnings-list');
        wl.innerHTML = '';
        for (const w of warnings) {
          const div = document.createElement('div');
          div.className = 'warn-item';
          div.textContent = `• ${w.id}: ${w.note}`;
          wl.appendChild(div);
        }
      }
      
      // Build file tree
      renderFileTree(generatedFiles);
      
      // Select first file
      const firstFile = Object.keys(generatedFiles)[0];
      if (firstFile) showFile(firstFile);
      
      setStatus(`Exported ${Object.keys(generatedFiles).length} files`);
    }
    
    function renderFileTree(files) {
      const tree = document.getElementById('file-tree');
      const fileNames = Object.keys(files);
      
      if (!fileNames.length) {
        tree.innerHTML = '<div class="empty-state"><div>No files generated</div></div>';
        return;
      }
      
      const zipBtn = `<button onclick="downloadZip()" title="Download all as ZIP">⬇ ZIP</button>`;
      
      tree.innerHTML = `
        <div class="file-tree-header">
          <span>generated/</span>
          ${zipBtn}
        </div>
        ${fileNames.map(name => `
          <div class="tree-file" id="tree-${name.replace(/[^a-z0-9]/gi,'_')}" onclick="showFile('${name}')">
            <span>${name}</span>
            <button class="dl-btn" onclick="event.stopPropagation();downloadFile('${name}')" title="Download">⬇</button>
          </div>
        `).join('')}
      `;
    }
    
    function showFile(filename) {
      activeFile = filename;
      const content = generatedFiles[filename] || '';
      
      // Update active state in tree
      document.querySelectorAll('.tree-file').forEach(el => el.classList.remove('active'));
      const treeEl = document.getElementById('tree-' + filename.replace(/[^a-z0-9]/gi,'_'));
      if (treeEl) treeEl.classList.add('active');
      
      // Syntax highlight
      const highlighted = highlightCode(content, filename.endsWith('.rs') ? 'rust' : 'json');
      
      document.getElementById('code-preview').innerHTML = `
        <button class="copy-btn" onclick="copyCode()">Copy</button>
        <pre>${highlighted}</pre>
      `;
    }
    
    function highlightCode(code, lang) {
      const escaped = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      if (lang !== 'rust') return escaped;
      
      return escaped
        .replace(/\/\/[^\n]*/g, m => `<span class="comment">${m}</span>`)
        .replace(/\b(pub|fn|let|mut|use|struct|enum|impl|match|if|else|for|while|return|mod|super|self|true|false|Some|None|Ok|Err)\b/g, 
          m => `<span class="kw">${m}</span>`)
        .replace(/"[^"]*"/g, m => `<span class="str">${m}</span>`)
        .replace(/\b\d+\.?\d*\b/g, m => `<span class="num">${m}</span>`)
        .replace(/\b([A-Z][a-zA-Z0-9]*)\b/g, m => `<span class="type">${m}</span>`);
    }
    
    function copyCode() {
      if (!activeFile) return;
      navigator.clipboard?.writeText(generatedFiles[activeFile] || '')
        .then(() => setStatus('Copied to clipboard'))
        .catch(() => setStatus('Copy failed'));
    }
    
    function downloadFile(filename) {
      const content = generatedFiles[filename] || '';
      const blob = new Blob([content], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }
    
    function downloadZip() {
      if (typeof JSZip === 'undefined') {
        // fallback: download individually
        Object.keys(generatedFiles).forEach(name => downloadFile(name));
        setStatus('JSZip not available — files downloaded individually');
        return;
      }
      
      const zip = new JSZip();
      const folder = zip.folder('generated');
      Object.entries(generatedFiles).forEach(([name, content]) => {
        folder.file(name, content);
      });
      zip.generateAsync({ type: 'blob' }).then(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'generated.zip';
        a.click();
        URL.revokeObjectURL(url);
        setStatus('Downloaded generated.zip');
      });
    }
  </script>
</body>
</html>
