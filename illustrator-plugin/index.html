<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>egui_expressive Export</title>
  <style>
    /* M3 dark theme */
    :root {
      --surface: #1c1b1f;
      --surface-container: #2b2930;
      --surface-container-high: #36343b;
      --on-surface: #e6e1e5;
      --on-surface-variant: #cac4d0;
      --primary: #ffd54f;
      --on-primary: #332600;
      --primary-muted: rgba(255, 213, 79, 0.22);
      --outline: #938f99;
      --outline-variant: #49454f;
      --error: #f2b8b5;
      --error-container: rgba(242, 184, 181, 0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--surface);
      color: var(--on-surface);
      font-size: 12px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    /* Header */
    .header {
      padding: 12px 16px 8px;
      border-bottom: 1px solid var(--outline-variant);
      flex-shrink: 0;
    }
    .header h1 { font-size: 14px; font-weight: 500; color: var(--primary); }
    .header p { font-size: 11px; color: var(--on-surface-variant); margin-top: 2px; }
    
    /* Artboard list */
    .artboard-section {
      padding: 8px 12px;
      border-bottom: 1px solid var(--outline-variant);
      flex-shrink: 0;
    }
    .section-label { 
      font-size: 10px; 
      text-transform: uppercase; 
      letter-spacing: 0.08em;
      color: var(--on-surface-variant);
      margin-bottom: 6px;
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .section-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .ghost-btn {
      background: none;
      border: 1px solid transparent;
      color: var(--on-surface-variant);
      font-size: 11px;
      cursor: pointer;
      padding: 3px 8px;
      border-radius: 999px;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .ghost-btn.primary {
      color: var(--primary);
    }
    .ghost-btn:hover {
      background: var(--surface-container);
      border-color: var(--outline-variant);
    }
    .artboard-list { max-height: 100px; overflow-y: auto; }
    .artboard-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 6px;
      border-radius: 4px;
      cursor: pointer;
    }
    .artboard-item:hover { background: var(--surface-container); }
    .artboard-item input[type=checkbox] { accent-color: var(--primary); }
    .artboard-item label { flex: 1; cursor: pointer; }
    
    /* Options */
    .options-section {
      padding: 8px 12px;
      border-bottom: 1px solid var(--outline-variant);
      flex-shrink: 0;
    }
    .option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3px 0;
    }
    .option-row label { color: var(--on-surface-variant); font-size: 11px; }
    .toggle {
      width: 32px; height: 16px;
      background: var(--outline);
      border-radius: 8px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle.on { background: var(--primary); }
    .toggle::after {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      background: white;
      border-radius: 50%;
      top: 2px; left: 2px;
      transition: left 0.2s;
    }
    .toggle.on::after { left: 18px; }
    
    /* Export button */
    .export-btn {
      margin: 8px 12px;
      padding: 10px;
      background: var(--primary);
      color: var(--on-primary);
      border: none;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      width: calc(100% - 24px);
      flex-shrink: 0;
    }
    .export-btn:hover { opacity: 0.9; }
    .export-btn:disabled {
      opacity: 1;
      cursor: not-allowed;
      background: var(--primary-muted);
      color: rgba(230, 225, 229, 0.45);
    }
    
    /* Main content area — split: file tree + code preview */
    .content-area {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    
    /* File tree */
    .file-tree {
      width: 140px;
      flex-shrink: 0;
      border-right: 1px solid var(--outline-variant);
      overflow-y: auto;
      padding: 8px 0;
    }
    .file-tree-header {
      padding: 4px 12px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--on-surface-variant);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .file-tree-header button {
      background: none;
      border: none;
      color: var(--primary);
      font-size: 10px;
      cursor: pointer;
      padding: 0;
    }
    .tree-folder {
      padding: 4px 12px;
      color: var(--on-surface-variant);
      font-size: 11px;
    }
    .tree-file {
      padding: 4px 12px 4px 20px;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 0;
    }
    .tree-file:hover { background: var(--surface-container); }
    .tree-file.active { background: var(--surface-container-high); color: var(--primary); }
    .tree-file .dl-btn {
      background: none;
      border: none;
      color: var(--on-surface-variant);
      cursor: pointer;
      padding: 0 2px;
      font-size: 10px;
      opacity: 0;
    }
    .tree-file:hover .dl-btn { opacity: 1; }
    
    /* Code preview */
    .code-preview {
      flex: 1;
      overflow: auto;
      padding: 8px;
    }
    .code-preview pre {
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 10px;
      line-height: 1.5;
      color: var(--on-surface);
      white-space: pre;
      tab-size: 4;
    }
    .code-preview .kw { color: #c792ea; }
    .code-preview .fn { color: #82aaff; }
    .code-preview .str { color: #c3e88d; }
    .code-preview .num { color: #f78c6c; }
    .code-preview .comment { color: #546e7a; font-style: italic; }
    .code-preview .type { color: #ffcb6b; }
    
    /* Copy button */
    .copy-btn {
      position: sticky;
      top: 4px;
      float: right;
      background: var(--surface-container-high);
      border: 1px solid var(--outline-variant);
      color: var(--on-surface-variant);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 10px;
      cursor: pointer;
      margin-bottom: 4px;
    }
    
    /* Warnings panel */
    .warnings-panel {
      background: var(--error-container);
      border-top: 1px solid rgba(242, 184, 181, 0.3);
      padding: 8px 12px;
      flex-shrink: 0;
      max-height: 80px;
      overflow-y: auto;
    }
    .warnings-panel .warn-title {
      color: var(--error);
      font-size: 10px;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .warnings-panel .warn-item {
      font-size: 10px;
      color: var(--on-surface-variant);
      padding: 1px 0;
    }
    
    /* Status bar */
    .status-bar {
      padding: 6px 12px;
      font-size: 10px;
      color: var(--on-surface-variant);
      border-top: 1px solid var(--outline-variant);
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .status-text {
      flex: 1;
      min-width: 0;
    }

    .ai-parser-status {
      font-size: 10px;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }
    .ai-parser-status .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--outline);
    }
    .ai-parser-status.available .dot { background: var(--primary); }
    .ai-parser-status.available { color: var(--primary); }
    .ai-parser-status.unavailable .dot { background: var(--outline); }
    .ai-parser-status.unavailable { color: var(--on-surface-variant); }

    .artboard-message {
      background: var(--surface-container);
      border: 1px solid var(--outline-variant);
      border-radius: 6px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 11px;
    }
    .artboard-message.error {
      background: var(--error-container);
      border-color: var(--error);
    }
    .artboard-message-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--on-surface-variant);
    }
    .artboard-message.error .artboard-message-title,
    .artboard-message.error .artboard-message-body {
      color: var(--error);
    }
    .artboard-message-detail {
      color: var(--on-surface-variant);
      line-height: 1.4;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--on-surface-variant);
      font-size: 11px;
      gap: 8px;
    }
    .empty-state .icon { font-size: 24px; }

    .artboard-list::-webkit-scrollbar,
    .file-tree::-webkit-scrollbar,
    .code-preview::-webkit-scrollbar,
    .warnings-panel::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    .artboard-list::-webkit-scrollbar-thumb,
    .file-tree::-webkit-scrollbar-thumb,
    .code-preview::-webkit-scrollbar-thumb,
    .warnings-panel::-webkit-scrollbar-thumb {
      background: var(--surface-container-high);
      border-radius: 999px;
      border: 2px solid var(--surface);
    }
    .artboard-list::-webkit-scrollbar-track,
    .file-tree::-webkit-scrollbar-track,
    .code-preview::-webkit-scrollbar-track,
    .warnings-panel::-webkit-scrollbar-track {
      background: var(--surface);
    }
  </style>
  <!-- JSZip is loaded from CDN for online use; CEP panels without internet will fall back to individual file downloads -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
  <header class="header" role="banner">
    <h1>egui_expressive Export</h1>
    <p>Illustrator → Rust scaffold generator</p>
  </header>
  
  <div class="artboard-section">
    <div class="section-header">
      <div class="section-label">Artboards <span id="artboard-count"></span></div>
      <div class="section-actions">
        <button class="ghost-btn primary" onclick="selectAll(true)">Select all</button>
        <button class="ghost-btn" onclick="selectAll(false)">None</button>
      </div>
    </div>
    <div class="artboard-list" id="artboard-list">
      <div style="color:var(--on-surface-variant);font-size:11px;padding:4px 0;">Loading artboards...</div>
    </div>
  </div>
  
  <div class="options-section">
    <div class="option-row">
      <label>Use naming conventions</label>
      <div class="toggle on" id="toggle-naming" role="button" tabindex="0" aria-label="Use naming conventions" onclick="toggleOption('naming')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleOption('naming')}"></div>
    </div>
    <div class="option-row">
      <label>Infer gaps</label>
      <div class="toggle on" id="toggle-gaps" role="button" tabindex="0" aria-label="Infer gaps between elements" onclick="toggleOption('gaps')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleOption('gaps')}"></div>
    </div>
    <div class="option-row">
      <label>JSON sidecar</label>
      <div class="toggle on" id="toggle-sidecar" role="button" tabindex="0" aria-label="Include sidecar JSON" onclick="toggleOption('sidecar')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleOption('sidecar')}"></div>
    </div>
    <div class="option-row">
      <label>Library-native emit</label>
      <div class="toggle on" id="toggle-native" role="button" tabindex="0" aria-label="Use library-native emit" onclick="toggleOption('native')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleOption('native')}"></div>
    </div>
  </div>
  
  <button class="export-btn" id="export-btn" onclick="doExport()">Export Selected Artboards</button>
  
  <main class="content-area">
    <div class="file-tree" id="file-tree">
      <div class="empty-state">
        <div class="icon">[ ]</div>
        <div>Export to see files</div>
      </div>
    </div>
    <div class="code-preview" id="code-preview">
      <div class="empty-state">
        <div class="icon">⬅</div>
        <div>Select a file to preview</div>
      </div>
    </div>
  </main>
  
  <section class="warnings-panel" id="warnings-panel" style="display:none;" aria-label="Warnings">
    <div class="warn-title">Elements requiring manual attention</div>
    <div id="warnings-list"></div>
  </section>
  
  <section class="status-bar" id="status-bar" aria-label="Status" role="status" aria-live="polite">
    <span class="status-text" id="status-text">Ready</span>
    <span class="ai-parser-status" id="ai-parser-status" title="Project file analysis via ai-parser"></span>
  </section>

  <!-- Plugin codegen library loaded for both UXP and CEP panel contexts -->
  <script src="plugin.js"></script>
  <script>
    const options = { naming: true, gaps: true, sidecar: true, native: true };
    const CEP_EVAL_ERROR = 'EvalScript error.';
    const CEP_HOST_READY = '__HOST_READY__';
    const CEP_HOST_MISSING = '__HOST_MISSING__';
    const CEP_HOST_FILE_MISSING = '__HOST_FILE_MISSING__';
    const CEP_HOST_ERROR_PREFIX = '__HOST_ERROR__:';
    const CEP_HOST_INIT_ATTEMPTS = 6;
    const CEP_HOST_INIT_DELAY_MS = 250;
    let generatedFiles = {};
    let activeFile = null;
    
    function toggleOption(key) {
      options[key] = !options[key];
      const el = document.getElementById('toggle-' + key);
      el.classList.toggle('on', options[key]);
    }
    
    function selectAll(val) {
      document.querySelectorAll('#artboard-list input[type=checkbox]').forEach(cb => cb.checked = val);
    }

    function setStatus(msg) {
      document.getElementById('status-text').textContent = msg;
    }
    
    function showArtboardError(msg, tone = 'error', title = '', detail = '') {
      const list = document.getElementById('artboard-list');
      const safeTitle = title || (tone === 'error' ? 'Unable to load artboards' : 'Status');
      const detailHtml = detail ? `<div class="artboard-message-detail">${escapeHtml(detail)}</div>` : '';
      list.innerHTML = `
        <div class="artboard-message ${tone}" role="${tone === 'error' ? 'alert' : 'status'}">
          <div class="artboard-message-title">${escapeHtml(safeTitle)}</div>
          <div class="artboard-message-body">${escapeHtml(msg)}</div>
          ${detailHtml}
        </div>
      `;
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function evalCepScript(script) {
      return new Promise(resolve => {
        try {
          if (!window.__adobe_cep__ || typeof window.__adobe_cep__.evalScript !== 'function') {
            resolve({ ok: false, error: 'CEP bridge unavailable' });
            return;
          }
          window.__adobe_cep__.evalScript(script, function(result) {
            const resStr = String(result || '').trim().toLowerCase();
            if (resStr === 'evalscript error.' || resStr === 'evalscript error') {
              resolve({ ok: false, error: CEP_EVAL_ERROR, result });
              return;
            }
            resolve({ ok: true, result });
          });
        } catch (e) {
          resolve({ ok: false, error: e && e.message ? e.message : String(e) });
        }
      });
    }

    function getExtensionRootPath() {
      try {
        if (window.__adobe_cep__ && typeof window.__adobe_cep__.getSystemPath === 'function') {
          try {
            const fromString = window.__adobe_cep__.getSystemPath('extension');
            if (fromString) return fromString;
          } catch (e) {}
          try {
            if (typeof SystemPath !== 'undefined' && SystemPath.EXTENSION) {
              const fromConstant = window.__adobe_cep__.getSystemPath(SystemPath.EXTENSION);
              if (fromConstant) return fromConstant;
            }
          } catch (e) {}
        }
      } catch (e) {}

      try {
        const href = window.location.href.split(/[?#]/)[0];
        const url = new URL(href);
        let root = decodeURIComponent(url.pathname || '');
        root = root.replace(/\/index\.html$/i, '');
        if (/^\/[A-Za-z]:/.test(root)) {
          root = root.slice(1);
        }
        return root;
      } catch (e) {
        return null;
      }
    }

    function escapeForExtendScriptPath(value) {
      return String(value || '').replace(/\\/g, '/').replace(/'/g, "\\'");
    }

    function buildCepHostProbeScript() {
      return `
        (function(){
          try {
            var ready =
              typeof getDiagnosticsJSON === 'function' &&
              typeof getArtboardsJSON === 'function' &&
              typeof extractArtboardDataJSON === 'function';
            return ready ? '${CEP_HOST_READY}' : '${CEP_HOST_MISSING}';
          } catch (e) {
            return '${CEP_HOST_ERROR_PREFIX}' + String(e);
          }
        })()
      `;
    }

    function getCepHostDetail(result, fallback) {
      const text = String(result || '').trim();
      if (!text || text === 'undefined') {
        return fallback;
      }
      if (text === CEP_HOST_MISSING) {
        return 'host.jsx loaded but did not expose the expected functions.';
      }
      if (text === CEP_HOST_FILE_MISSING) {
        return 'host.jsx was not found in the installed extension folder.';
      }
      if (text.indexOf(CEP_HOST_ERROR_PREFIX) === 0) {
        return text.slice(CEP_HOST_ERROR_PREFIX.length) || fallback;
      }
      return text;
    }

    async function forceLoadCepHost() {
      const root = getExtensionRootPath();
      if (!root) {
        return { ok: false, detail: 'Could not resolve the extension install path.' };
      }

      const hostPath = escapeForExtendScriptPath(root.replace(/[\\/]+$/, '') + '/host.jsx');
      const loadResult = await evalCepScript(`
        (function(){
          try {
            var hostFile = File('${hostPath}');
            if (!hostFile.exists) {
              return '${CEP_HOST_FILE_MISSING}';
            }
            $.evalFile(hostFile);
            return (${buildCepHostProbeScript()});
          } catch (e) {
            return '${CEP_HOST_ERROR_PREFIX}' + String(e);
          }
        })()
      `);
      if (!loadResult.ok) {
        return { ok: false, detail: loadResult.error || 'ExtendScript rejected $.evalFile().' };
      }

      const detail = getCepHostDetail(loadResult.result, 'Unexpected response while loading host.jsx.');
      if (String(loadResult.result || '').trim() === CEP_HOST_READY) {
        return { ok: true };
      }
      return { ok: false, detail };
    }

    async function ensureCepHostReady() {
      let lastDetail = '';
      for (let attempt = 1; attempt <= CEP_HOST_INIT_ATTEMPTS; attempt += 1) {
        const probe = await evalCepScript(buildCepHostProbeScript());
        if (probe.ok) {
          const probeResult = String(probe.result || '').trim();
          if (probeResult === CEP_HOST_READY) {
            return { ok: true };
          }
          lastDetail = getCepHostDetail(probeResult, 'ExtendScript startup probe returned an unexpected response.');
        } else {
          lastDetail = probe.error || lastDetail;
        }

        if (attempt === 1) {
          const forced = await forceLoadCepHost();
          if (forced.ok) {
            return { ok: true };
          }
          lastDetail = forced.detail || lastDetail;
        }

        if (attempt < CEP_HOST_INIT_ATTEMPTS) {
          await wait(CEP_HOST_INIT_DELAY_MS * attempt);
        }
      }

      return { ok: false, detail: lastDetail || 'The ExtendScript host never became ready.' };
    }

    async function loadCepArtboards() {
      const hostReady = await ensureCepHostReady();
      if (!hostReady.ok) {
        showArtboardError(
          'Illustrator did not finish loading host.jsx for this panel.',
          'error',
          'ExtendScript host unavailable',
          (hostReady.detail || 'Restart Illustrator, reinstall the latest build, and if the panel is still green you are likely running an older install.')
        );
        setStatus('ExtendScript host unavailable');
        return;
      }

      const diagResponse = await evalCepScript('getDiagnosticsJSON()');
      if (!diagResponse.ok) {
        showArtboardError(
          'CEP connected, but Illustrator rejected the first diagnostics call.',
          'error',
          'evalScript failed',
          'Restart Illustrator, reinstall the latest build, and rerun install_zxp.bat only if the panel still fails after reinstall.'
        );
        setStatus('CEP evalScript failed');
        return;
      }

      let diag;
      try {
        diag = JSON.parse(diagResponse.result);
      } catch (e) {
        showArtboardError('Illustrator returned invalid diagnostics.\nRaw response: ' + String(diagResponse.result), 'error', 'Unexpected diagnostics', e.message);
        setStatus('Invalid Illustrator diagnostics');
        return;
      }

      if (diag && diag.error) {
        showArtboardError('Illustrator error: ' + diag.error, 'error', 'Illustrator reported an error');
        setStatus('Illustrator error: ' + diag.error);
        return;
      }
      if (!diag.hasDoc) {
        showArtboardError('No document open in Illustrator. Open an .ai file first.', 'info', 'Open a document');
        setStatus('Open an Illustrator document first');
        return;
      }
      if (diag.artboardCount === 0) {
        showArtboardError('No artboards found in this document. Add at least one artboard in Illustrator.', 'info', 'No artboards found');
        setStatus('No artboards in document');
        return;
      }

      const artboardsResponse = await evalCepScript('getArtboardsJSON()');
      if (!artboardsResponse.ok) {
        showArtboardError('Illustrator was ready, but loading artboards still failed.', 'error', 'Artboard query failed', 'Restart Illustrator and reinstall the latest build if this persists.');
        setStatus('Artboard query failed');
        return;
      }
      if (!artboardsResponse.result || artboardsResponse.result === 'undefined') {
        showArtboardError('No document open in Illustrator.', 'info', 'Open a document');
        setStatus('No document open in Illustrator');
        return;
      }

      try {
        const parsed = JSON.parse(artboardsResponse.result);
        if (parsed && parsed.error) {
          showArtboardError('Illustrator error: ' + parsed.error, 'error', 'Illustrator reported an error');
          setStatus('Illustrator error: ' + parsed.error);
          return;
        }
        loadArtboards(parsed);
        setStatus('Ready — ' + parsed.length + ' artboard(s) loaded');
      } catch (e) {
        showArtboardError('Error parsing artboard data.\nRaw response: ' + String(artboardsResponse.result), 'error', 'Artboard data could not be read', e.message);
        setStatus('Error parsing artboard data: ' + e.message);
      }
    }
    
    // Request artboard list on load
    window.addEventListener('load', async () => {
      try {
        if (window.__adobe_cep__) {
          try {
            await loadCepArtboards();
          } catch(ce) {
            showArtboardError('CEP error: ' + ce.message, 'error', 'CEP error');
            setStatus('CEP error: ' + ce.message);
          }
        } else {
          // UXP path: postMessage
          window.postMessage({ type: 'GET_ARTBOARDS' }, '*');
        }
      } catch(e) {
        showArtboardError('Plugin load error: ' + e.message, 'error', 'Plugin load error');
        setStatus('Plugin load error: ' + e.message);
      }
      checkAiParser();
    });
    
    function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
    
    function loadArtboards(data) {
      const list = document.getElementById('artboard-list');
      const artboards = typeof data === 'string' ? JSON.parse(data) : data;
      if (!artboards || !artboards.length) {
        list.innerHTML = '<div style="color:var(--on-surface-variant);font-size:11px;padding:4px 0;">No artboards found</div>';
        return;
      }
      document.getElementById('artboard-count').textContent = `(${artboards.length})`;
      list.innerHTML = artboards.map((ab, i) => `
        <div class="artboard-item">
          <input type="checkbox" id="ab-${i}" checked>
          <label for="ab-${i}">${escapeHtml(ab.name)} <span style="color:var(--on-surface-variant)">${Math.round(ab.width)}×${Math.round(ab.height)}</span></label>
        </div>
      `).join('');
    }
    
    function doExport() {
      const selected = Array.from(document.querySelectorAll('#artboard-list input:checked'))
        .map(cb => parseInt(cb.id.replace('ab-', '')));
      const selectedTiles = Array.from(document.querySelectorAll('#tile-list input:checked'))
        .map(cb => {
          const idx = parseInt(cb.id.replace('tile-', ''));
          return currentTiles[idx];
        });
      if (!selected.length && !selectedTiles.length) { setStatus('Select at least one artboard or page tile'); return; }
      
      document.getElementById('export-btn').disabled = true;
      setStatus('Exporting...');
      
      var exportPayload = {
        selected: selected,
        selectedTiles: selectedTiles
      };
      
      try {
        if (window.__adobe_cep__) {
          (async () => {
            const hostReady = await ensureCepHostReady();
            if (!hostReady.ok) {
              document.getElementById('export-btn').disabled = false;
              setStatus('ExtendScript host unavailable — restart Illustrator and reinstall the latest build');
              return;
            }

            const abResult = await evalCepScript('getArtboardsJSON()');
            if (!abResult.ok) {
              document.getElementById('export-btn').disabled = false;
              setStatus('evalScript error — host.jsx is still unavailable');
              return;
            } else if (!abResult.result || abResult.result === 'undefined') {
              document.getElementById('export-btn').disabled = false;
              setStatus('No document open in Illustrator');
              return;
            }

            const result = await evalCepScript('extractArtboardDataJSON(' + JSON.stringify(JSON.stringify(exportPayload)) + ')');
            if (!result.ok) {
              document.getElementById('export-btn').disabled = false;
              setStatus('evalScript error — host.jsx is still unavailable');
              return;
            } else if (!result.result || result.result === 'undefined') {
              document.getElementById('export-btn').disabled = false;
              setStatus('Could not extract artboard data');
              return;
            }

            try {
              const rawData = JSON.parse(result.result);
              if (rawData && rawData.error) {
                document.getElementById('export-btn').disabled = false;
                setStatus('Illustrator error: ' + rawData.error);
                return;
              }
              const exportResult = exportFromRawData(rawData, options);
              handleExportResult({ payload: { files: exportResult.files, filesArray: Object.entries(exportResult.files).map(([filename, content]) => ({filename, content})), colorMap: exportResult.colorMap, warnings: exportResult.warnings || [] } });
              document.getElementById('export-btn').disabled = false;
              setStatus('Exported ' + Object.keys(exportResult.files).length + ' files');
            } catch(e) {
              document.getElementById('export-btn').disabled = false;
              setStatus('Error processing export: ' + e.message);
            }
          })().catch(e => {
            document.getElementById('export-btn').disabled = false;
            setStatus('Error processing export: ' + e.message);
          });
        } else {
          // UXP path: postMessage
          window.postMessage({ 
            type: 'EXPORT', 
            selectedIndices: selected,
            selectedTiles: selectedTiles,
            options 
          }, '*');
        }
      } catch(e) {
        setStatus('Error: ' + e.message);
        document.getElementById('export-btn').disabled = false;
      }
    }
    
    // Handle messages from plugin.js
    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg) return;

      if (msg.type === 'ARTBOARDS_RESULT') {
        if (!msg.artboards || msg.artboards.length === 0) {
          showArtboardError('No artboards found. Make sure an Illustrator document is open with at least one artboard.');
          setStatus('No artboards found');
        } else {
          loadArtboards(msg.artboards);
          setStatus('Artboards loaded');
        }
      } else if (msg.type === 'EXPORT_RESULT') {
        handleExportResult(msg);
      } else if (msg.type === 'AI_PARSER_STATUS') {
        updateAiParserStatus(msg.available);
      } else if (msg.type === 'ERROR') {
        document.getElementById('export-btn').disabled = false;
        setStatus('Error: ' + (msg.message || 'Unknown error'));
        showArtboardError(msg.message || 'Unknown error');
      }
    });

    // Check ai-parser availability on load
    function checkAiParser() {
      try {
        if (typeof window.__adobe_cep__ === 'undefined') {
          window.postMessage({ type: 'CHECK_AI_PARSER' }, '*');
        }
      } catch(e) {
        setStatus('ai-parser check failed: ' + e.message);
      }
    }

    function updateAiParserStatus(available) {
      const el = document.getElementById('ai-parser-status');
      if (!el) return;
      el.className = 'ai-parser-status ' + (available ? 'available' : 'unavailable');
      el.innerHTML = `<span class="dot"></span>Project file analysis: ${available ? 'Available' : 'Not available'}`;
    }
    
    function handleExportResult(msg) {
      document.getElementById('export-btn').disabled = false;
      
      const result = msg.payload || msg;
      if (result.error) {
        setStatus('Error: ' + result.error);
        return;
      }
      
      // Build file map
      generatedFiles = {};
      if (result.files) {
        if (Array.isArray(result.files)) {
          result.files.forEach(f => { generatedFiles[f.filename] = f.content; });
        } else {
          // files is an object map { filename: content, ... }
          generatedFiles = result.files;
        }
      } else if (result.filesArray) {
        result.filesArray.forEach(f => { generatedFiles[f.filename] = f.content; });
      }
      
      // Show warnings
      const warnings = result.warnings || [];
      const wp = document.getElementById('warnings-panel');
      if (warnings.length > 0) {
        wp.style.display = 'block';
        const wl = document.getElementById('warnings-list');
        wl.innerHTML = '';
        for (const w of warnings) {
          const div = document.createElement('div');
          div.className = 'warn-item';
          div.textContent = `• ${w.id}: ${w.note}`;
          wl.appendChild(div);
        }
      } else {
        wp.style.display = 'none';
        document.getElementById('warnings-list').innerHTML = '';
      }
      
      // Build file tree
      renderFileTree(generatedFiles);
      
      // Select first file
      const firstFile = Object.keys(generatedFiles)[0];
      if (firstFile) showFile(firstFile);
      
      setStatus(`Exported ${Object.keys(generatedFiles).length} files`);
    }
    
    function renderFileTree(files) {
      const tree = document.getElementById('file-tree');
      const fileNames = Object.keys(files);
      
      if (!fileNames.length) {
        tree.innerHTML = '<div class="empty-state"><div>No files generated</div></div>';
        return;
      }
      
      const saveBtn = window.__adobe_cep__ 
        ? `<button onclick="saveToFolder()" title="Save all to folder">Save to Folder</button>`
        : `<button onclick="downloadZip()" title="Download all as ZIP">Get ZIP</button>`;
      
      tree.innerHTML = `
        <div class="file-tree-header">
          <span>generated/</span>
          ${saveBtn}
        </div>
        ${fileNames.map(name => `
          <div class="tree-file" id="tree-${name.replace(/[^a-z0-9]/gi,'_')}" onclick="showFile('${name}')">
            <span>${name}</span>
            <button class="dl-btn" onclick="event.stopPropagation();downloadFile('${name}')" title="Download ${name}">Get ${name}</button>
          </div>
        `).join('')}
      `;
    }
    
    function showFile(filename) {
      activeFile = filename;
      const content = generatedFiles[filename] || '';
      
      // Update active state in tree
      document.querySelectorAll('.tree-file').forEach(el => el.classList.remove('active'));
      const treeEl = document.getElementById('tree-' + filename.replace(/[^a-z0-9]/gi,'_'));
      if (treeEl) treeEl.classList.add('active');
      
      // Syntax highlight
      const highlighted = highlightCode(content, filename.endsWith('.rs') ? 'rust' : 'json');
      
      document.getElementById('code-preview').innerHTML = `
        <button class="copy-btn" onclick="copyCode()">Copy</button>
        <pre>${highlighted}</pre>
      `;
    }
    
    function highlightCode(code, lang) {
      const escaped = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      if (lang !== 'rust') return escaped;
      
      return escaped
        .replace(/\/\/[^\n]*/g, m => `<span class="comment">${m}</span>`)
        .replace(/\b(pub|fn|let|mut|use|struct|enum|impl|match|if|else|for|while|return|mod|super|self|true|false|Some|None|Ok|Err)\b/g, 
          m => `<span class="kw">${m}</span>`)
        .replace(/"[^"]*"/g, m => `<span class="str">${m}</span>`)
        .replace(/\b\d+\.?\d*\b/g, m => `<span class="num">${m}</span>`)
        .replace(/\b([A-Z][a-zA-Z0-9]*)\b/g, m => `<span class="type">${m}</span>`);
    }
    
    function copyCode() {
      if (!activeFile) return;
      navigator.clipboard?.writeText(generatedFiles[activeFile] || '')
        .then(() => setStatus('Copied to clipboard'))
        .catch(() => setStatus('Copy failed'));
    }
    
    function downloadFile(filename) {
      const content = generatedFiles[filename] || '';
      const blob = new Blob([content], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }
    
    function downloadZip() {
      if (typeof JSZip === 'undefined') {
        // fallback: download individually
        Object.keys(generatedFiles).forEach(name => downloadFile(name));
        setStatus('JSZip not available — files downloaded individually');
        return;
      }
      
      const zip = new JSZip();
      const folder = zip.folder('generated');
      Object.entries(generatedFiles).forEach(([name, content]) => {
        folder.file(name, content);
      });
      zip.generateAsync({ type: 'blob' }).then(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'generated.zip';
        a.click();
        URL.revokeObjectURL(url);
        setStatus('Downloaded generated.zip');
      });
    }

    async function saveToFolder() {
      if (!window.__adobe_cep__) {
        setStatus('Save to folder is only available in Illustrator');
        return;
      }
      
      setStatus('Select a folder...');
      const payload = { files: generatedFiles };
      // Double stringify: once for the JSON payload, once to escape it as a string literal for evalScript
      const script = 'saveFilesToFolderJSON(' + JSON.stringify(JSON.stringify(payload)) + ')';
      const result = await evalCepScript(script);
      
      if (!result.ok) {
        setStatus('Failed to save: ' + result.error);
        return;
      }
      
      try {
        const parsed = JSON.parse(result.result);
        if (parsed.canceled) {
          setStatus('Save canceled');
        } else if (parsed.error) {
          setStatus('Save error: ' + parsed.error);
        } else if (parsed.success) {
          setStatus('Saved ' + parsed.saved.length + ' files to ' + parsed.folder);
        }
      } catch (e) {
        setStatus('Error parsing save result');
      }
    }
  </script>
</body>
</html>
