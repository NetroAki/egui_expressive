<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#c8c8c8"/>
  <!-- Clip boundary outline -->
  <rect x="10" y="10" width="50" height="50" fill="none" stroke="blue" stroke-width="2"/>
  <!-- Clipped green fill -->
  <rect x="12" y="12" width="46" height="46" fill="#00c800"/>
  <!-- Red cross outside clip -->
  <line x1="70" y1="10" x2="90" y2="30" stroke="red" stroke-width="2"/>
  <line x1="90" y1="10" x2="70" y2="30" stroke="red" stroke-width="2"/>
</svg>
