<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#c8c8c8"/>
  <!-- Outer square (blue ring area) -->
  <rect x="10" y="10" width="80" height="80" fill="#0064ff"/>
  <!-- Inner hole (gray background shows through) -->
  <rect x="35" y="35" width="30" height="30" fill="#c8c8c8"/>
  <!-- Red cross in the hole area -->
  <line x1="40" y1="40" x2="60" y2="60" stroke="red" stroke-width="2"/>
  <line x1="60" y1="40" x2="40" y2="60" stroke="red" stroke-width="2"/>
</svg>
