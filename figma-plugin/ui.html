<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>egui_expressive Token Exporter</title>
<style>
  :root {
    --bg: #1c1b1f;
    --surface: #211f26;
    --surface-high: #2b2930;
    --primary: #d0bcff;
    --primary-container: #4f378b;
    --on-primary: #381e72;
    --on-surface: #e6e1e5;
    --on-surface-variant: #cac4d0;
    --outline: #938f99;
    --outline-variant: #49454f;
    --error: #f2b8b5;
    --font: system-ui, -apple-system, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--on-surface);
    font-family: var(--font);
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .header {
    background: var(--surface);
    padding: 12px 16px;
    border-bottom: 1px solid var(--outline-variant);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .header-icon {
    width: 28px; height: 28px;
    background: var(--primary-container);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .header-title { font-size: 14px; font-weight: 500; color: var(--on-surface); }
  .header-sub { font-size: 11px; color: var(--on-surface-variant); }
  .toolbar {
    padding: 8px 16px;
    display: flex;
    gap: 8px;
    align-items: center;
    border-bottom: 1px solid var(--outline-variant);
    flex-shrink: 0;
  }
  .btn {
    height: 32px;
    padding: 0 16px;
    border-radius: 16px;
    border: none;
    cursor: pointer;
    font-family: var(--font);
    font-size: 12px;
    font-weight: 500;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--primary); color: var(--on-primary); }
  .btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--outline); }
  .btn-tonal { background: var(--primary-container); color: var(--primary); }
  .stats {
    padding: 8px 16px;
    display: flex;
    gap: 16px;
    flex-shrink: 0;
  }
  .stat { font-size: 11px; color: var(--on-surface-variant); }
  .stat strong { color: var(--primary); }
  .json-area {
    flex: 1;
    margin: 0 16px 8px;
    background: #0d0d12;
    border: 1px solid var(--outline-variant);
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .json-area textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #abb2bf;
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.5;
    padding: 12px;
    resize: none;
    width: 100%;
  }
  .usage {
    margin: 0 16px 12px;
    background: var(--surface);
    border: 1px solid var(--outline-variant);
    border-radius: 8px;
    padding: 10px 12px;
    flex-shrink: 0;
  }
  .usage-title { font-size: 11px; font-weight: 500; color: var(--on-surface-variant); margin-bottom: 6px; }
  .usage-cmd {
    font-family: var(--mono);
    font-size: 11px;
    color: #98c379;
    background: #0d0d12;
    padding: 6px 10px;
    border-radius: 4px;
    word-break: break-all;
  }
  .error-msg {
    margin: 8px 16px;
    padding: 10px 12px;
    background: rgba(242, 184, 181, 0.1);
    border: 1px solid var(--error);
    border-radius: 8px;
    color: var(--error);
    font-size: 12px;
    display: none;
  }
  .status {
    padding: 4px 16px 8px;
    font-size: 11px;
    color: var(--on-surface-variant);
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">⚡</div>
  <div>
    <div class="header-title">egui_expressive Token Exporter</div>
    <div class="header-sub">Export Figma styles → Rust DesignTokens</div>
  </div>
</div>

<div class="toolbar">
  <button class="btn btn-primary" onclick="reexport()">↻ Re-export</button>
  <button class="btn btn-tonal" onclick="copyJson()">Copy JSON</button>
  <button class="btn btn-outline" onclick="downloadJson()">Download tokens.json</button>
</div>

<div class="stats" id="stats">
  <span class="stat">Loading...</span>
</div>

<div class="error-msg" id="error-msg"></div>

<div class="json-area">
  <textarea id="json-output" readonly spellcheck="false" placeholder="Exporting tokens..."></textarea>
</div>

<div class="usage">
  <div class="usage-title">Usage — convert to Rust:</div>
  <div class="usage-cmd">cargo run --bin figma-export -- tokens.json &gt; src/design_tokens.rs</div>
</div>

<div class="status" id="status">Ready</div>

<script>
  let currentJson = '';

  window.onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;
    if (msg.type === 'result') {
      if (msg.error) {
        document.getElementById('error-msg').style.display = 'block';
        document.getElementById('error-msg').textContent = 'Error: ' + msg.error;
        document.getElementById('stats').innerHTML = '<span class="stat" style="color:var(--error)">Export failed</span>';
      } else {
        document.getElementById('error-msg').style.display = 'none';
        currentJson = msg.json;
        document.getElementById('json-output').value = msg.json;
        updateStats(msg.json);
        document.getElementById('status').textContent = 'Exported at ' + new Date().toLocaleTimeString();
      }
    }
  };

  function updateStats(json) {
    try {
      const data = JSON.parse(json);
      const global = data.global || data;
      let colorCount = 0, spacingCount = 0, typographyCount = 0, effectCount = 0;
      for (const [group, tokens] of Object.entries(global)) {
        for (const [, token] of Object.entries(tokens)) {
          if (token.type === 'color') colorCount++;
          else if (token.type === 'spacing') spacingCount++;
          else if (token.type === 'typography') typographyCount++;
          else if (token.type === 'boxShadow') effectCount++;
        }
      }
      document.getElementById('stats').innerHTML =
        `<span class="stat"><strong>${colorCount}</strong> colors</span>` +
        `<span class="stat"><strong>${spacingCount}</strong> spacing</span>` +
        `<span class="stat"><strong>${typographyCount}</strong> typography</span>` +
        `<span class="stat"><strong>${effectCount}</strong> effects</span>`;
    } catch(e) {
      document.getElementById('stats').innerHTML = '<span class="stat">Exported</span>';
    }
  }

  function reexport() {
    document.getElementById('status').textContent = 'Exporting...';
    parent.postMessage({ pluginMessage: { type: 'export' } }, '*');
  }

  function copyJson() {
    if (!currentJson) return;
    navigator.clipboard.writeText(currentJson).then(() => {
      document.getElementById('status').textContent = 'Copied to clipboard!';
      setTimeout(() => document.getElementById('status').textContent = 'Ready', 2000);
    });
  }

  function downloadJson() {
    if (!currentJson) return;
    const blob = new Blob([currentJson], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'tokens.json';
    a.click();
    URL.revokeObjectURL(url);
    document.getElementById('status').textContent = 'Downloaded tokens.json';
  }
</script>
</body>
</html>
